<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЯрТара - Товар</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .product-detail { display: flex; gap: 30px; flex-wrap: wrap; margin: 30px 0; }
        .gallery { flex: 1; min-width: 250px; }
        .gallery img { max-width: 100%; border-radius: 8px; }
        .info { flex: 2; }
        .price { font-size: 28px; color: #b12704; font-weight: bold; }
        .btn { background: #ff6600; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .similar-products { margin-top: 40px; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 15px; margin-top: 20px; }
        .similar-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
        .similar-card img { max-width: 100%; height: 120px; object-fit: contain; }
        .similar-price { font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>ЯрТара</h1>
                <p>Стеклянные банки и товары для дома оптом</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="index.html#contacts">Контакты</a></li>
                </ul>
            </nav>
            <div class="contact-info">
                <p>📍 г. Новосибирск, ул. Сибиряков-Гвардейцев, 49/1 корпус 18/1</p>
            </div>
        </div>
    </header>

    <div class="container" id="productContainer"></div>

    <footer>
        <div class="container">
            <p>&copy; 2026 ЯрТара. Все права защищены. Цены оптовые, с НДС.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));

        async function loadProduct() {
            const container = document.getElementById('productContainer');
            if (!productId) {
                container.innerHTML = '<p>❌ Товар не указан. Перейдите из <a href="catalog.html">каталога</a>.</p>';
                return;
            }
            try {
                const response = await fetch('data/products.json');
                const products = await response.json();
                const product = products.find(p => p.id === productId);
                if (!product) {
                    container.innerHTML = '<p>❌ Товар не найден. Вернитесь в <a href="catalog.html">каталог</a>.</p>';
                    return;
                }
                renderProduct(product);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p>❌ Ошибка загрузки. Убедись, что открыто через http://localhost:8000</p>';
            }
        }

        function renderProduct(product) {
            const container = document.getElementById('productContainer');
            container.innerHTML = `
                <div class="product-detail">
                    <div class="gallery">
                        <img src="${product.images?.[0] || 'https://via.placeholder.com/400x300?text=Фото'}" alt="${escapeHtml(product.name)}">
                    </div>
                    <div class="info">
                        <h1>${escapeHtml(product.name)}</h1>
                        <div class="price">💰 ${product.price.toFixed(2)} ₽</div>
                        <p>📦 В наличии: <strong>${product.stock}</strong> шт.</p>
                        ${product.volume ? `<p>📏 Объём: ${product.volume}</p>` : ''}
                        ${product.diameter ? `<p>🔘 Диаметр горла: ${product.diameter}</p>` : ''}
                        <p>${escapeHtml(product.description).replace(/\n/g, '<br>')}</p>
                        <button class="btn" onclick="alert('📞 Свяжитесь с нами: +7 (383) 123-45-67')">Заказать</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadProduct();
    </script>
</body>
</html>
