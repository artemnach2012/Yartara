<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЯрТара - Товар</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; }
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo h1 { font-size: 1.8rem; color: #e67e22; }
        .logo p { font-size: 0.9rem; opacity: 0.8; }
        nav ul { display: flex; list-style: none; gap: 1.5rem; }
        nav a { color: white; text-decoration: none; }
        nav a:hover { color: #e67e22; }
        .product-detail { display: flex; gap: 30px; flex-wrap: wrap; background: white; border-radius: 16px; padding: 30px; margin: 40px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .gallery { flex: 1; min-width: 250px; }
        .gallery img { max-width: 100%; border-radius: 12px; }
        .info { flex: 2; }
        .price { font-size: 32px; color: #e67e22; font-weight: bold; margin: 15px 0; }
        .btn { background: #e67e22; color: white; padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; font-size: 16px; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background: #d35400; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 1.5rem; margin-top: 2rem; }
        @media (max-width: 768px) { header .container { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>ЯрТара</h1>
                <p>Стеклянные банки и товары для дома оптом</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="index.html#contacts">Контакты</a></li>
                </ul>
            </nav>
            <div class="contact-info">
                <p>📍 г. Новосибирск, ул. Сибиряков-Гвардейцев, 49/1 корпус 18/1</p>
            </div>
        </div>
    </header>

    <div class="container" id="productContainer">Загрузка...</div>

    <footer>
        <div class="container">
            <p>&copy; 2026 ЯрТара. Все права защищены. Цены оптовые, с НДС.</p>
        </div>
    </footer>

    <script>
        const productId = new URLSearchParams(window.location.search).get('id');

        async function loadProduct() {
            const container = document.getElementById('productContainer');
            if (!productId) {
                container.innerHTML = '<p style="text-align:center; margin:40px;">❌ Товар не указан. Перейдите из <a href="catalog.html">каталога</a>.</p>';
                return;
            }
            try {
                const res = await fetch('data/products.json');
                const products = await res.json();
                const product = products.find(p => p.id == productId);
                if (!product) throw new Error();
                container.innerHTML = `
                    <div class="product-detail">
                        <div class="gallery">
                            <img src="${product.images?.[0] || 'https://via.placeholder.com/400x300?text=Фото'}" alt="${escapeHtml(product.name)}">
                        </div>
                        <div class="info">
                            <h1>${escapeHtml(product.name)}</h1>
                            <div class="price">💰 ${product.price.toFixed(2)} ₽</div>
                            <p>📦 В наличии: <strong>${product.stock}</strong> шт.</p>
                            ${product.volume ? `<p>📏 Объём: ${product.volume}</p>` : ''}
                            ${product.diameter ? `<p>🔘 Диаметр горла: ${product.diameter}</p>` : ''}
                            <p>${escapeHtml(product.description).replace(/\n/g, '<br>')}</p>
                            <button class="btn" onclick="alert('📞 Свяжитесь с нами: +7 (913) 735-55-81')">Заказать</button>
                        </div>
                    </div>
                `;
            } catch(e) {
                container.innerHTML = '<p style="text-align:center; margin:40px;">❌ Товар не найден или ошибка загрузки.</p>';
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        loadProduct();
    </script>
</body>
</html>
